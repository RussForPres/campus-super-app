<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather + Study Timer</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<a href="#main" class="skip-link">Skip to content</a>

<nav class="navbar navbar-dark bg-dark p-3">
  <div class="container-fluid">
    <a class="navbar-brand" href="index.html">Campus Life Super App</a>
    <div>
      <a href="events.html" class="btn btn-light btn-sm">Events</a>
      <a href="weather.html" class="btn btn-light btn-sm">Weather</a>
      <a href="dining.html" class="btn btn-light btn-sm">Dining</a>
    </div>
  </div>
</nav>

<main id="main" class="container mt-5">

  <h2 class="text-center mb-4">Weather + Study Timer</h2>

  <div class="card p-4 mb-4">

    <label for="cityInput">City</label>
    <input type="text" id="cityInput" class="form-control" placeholder="Enter city">
    <button id="getWeatherBtn" class="btn btn-primary mt-2">Get Weather</button>

    <div id="weatherResult" class="mt-3"></div>

  </div>

  <div class="card p-4">

    <h4>Study Timer</h4>

    <label for="studyMinutes">Study Minutes</label>
    <input type="number" id="studyMinutes" class="form-control" placeholder="Minutes">

    <button id="startTimerBtn" class="btn btn-success mt-2">Start Timer</button>

    <h3 id="timerDisplay" class="mt-3"></h3>

  </div>

</main>

</body>
</html>
